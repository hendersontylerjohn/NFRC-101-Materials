name: Update NFRC 101 Materials Library

# This workflow runs the NFRC 101 synchronization pipeline on a schedule and
# on demand. It commits the resulting JSON files to the repository ONLY when
# their content has changed (idempotent).
#
# Trigger model:
#   - schedule: daily at 06:00 UTC (off-peak for NFRC's CDN).
#   - workflow_dispatch: manual run from the GitHub Actions UI.
#   - push (on main, restricted to pipeline source files): re-runs the pipeline
#     to confirm the workflow itself is still healthy.
#
# Permissions: the default `GITHUB_TOKEN` is sufficient because we only need
# `contents: write` to push commits to the same repository.

on:
  schedule:
    # Run daily at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force reprocessing even if the PDF has not changed'
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/update.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'

# Prevent overlapping runs of the same workflow. A new run will cancel any
# in-progress run on the same ref.
concurrency:
  group: nfrc101-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    name: Sync NFRC 101 materials
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # All runtime config is via environment variables; see src/config.py.
      # The pipeline auto-discovers the PDF URL from the landing page.
      NFRC_LANDING_PAGE_URL: 'https://nfrccommunity.org/page/TD'
      NFRC_OUTPUT_DIR: '${{ github.workspace }}/data'
      NFRC_PDF_CACHE_DIR: '${{ github.workspace }}/.cache/pdf'
      NFRC_HTTP_TIMEOUT: '60'
      NFRC_HTTP_RETRIES: '3'
      NFRC_LOG_LEVEL: 'INFO'
      NFRC_FAIL_ON_VALIDATION: 'true'
      PYTHONUNBUFFERED: '1'
      PIP_NO_CACHE_DIR: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (sanity check on every run)
        # Tests use synthetic PDFs / fixtures; they do not hit the network.
        # They guard against regressions before we touch the live PDF.
        run: |
          pip install -r requirements-dev.txt
          pytest -q --tb=short

      - name: Determine force flag
        id: force
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NFRC 101 sync pipeline
        id: sync
        run: |
          if [ "${{ steps.force.outputs.force }}" = "true" ]; then
            python -m src.main --force
          else
            python -m src.main
          fi

      - name: Show validation report
        if: always()
        run: |
          if [ -f data/validation_report.json ]; then
            echo "::group::Validation report"
            cat data/validation_report.json
            echo
            echo "::endgroup::"
          fi

      - name: Show metadata
        if: always()
        run: |
          if [ -f data/metadata.json ]; then
            echo "::group::Metadata"
            cat data/metadata.json
            echo
            echo "::endgroup::"
          fi

      - name: Detect changes in data/
        id: changes
        run: |
          # `git status --porcelain` lists paths with a 2-char status code.
          # We consider only changes inside the data/ directory.
          set -e
          git add data/
          CHANGED=$(git status --porcelain data/ | wc -l | tr -d ' ')
          echo "changed_count=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Detected ${CHANGED} changed file(s) in data/."
          git status --porcelain data/ || true

      - name: Commit and push updates
        if: steps.changes.outputs.changed_count != '0'
        run: |
          # Use the built-in GITHUB_TOKEN actor identity.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Compose a commit message that includes the document version from
          # metadata.json (helps audit changes over time).
          VERSION=$(python -c "import json; print(json.load(open('data/metadata.json')).get('document_version','unknown'))" 2>/dev/null || echo unknown)
          HASH=$(python -c "import json; print(json.load(open('data/metadata.json')).get('pdf_hash','unknown')[:12])" 2>/dev/null || echo unknown)

          git commit -m "chore(data): sync NFRC 101 materials (${VERSION}, sha ${HASH})" \
                     -m "Automated update from GitHub Actions workflow." \
                     -m "Source: ${NFRC_LANDING_PAGE_URL}"

          git push
          echo "Committed and pushed updates."

      - name: Workflow summary
        if: always()
        run: |
          echo "::group::Pipeline summary"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run: ${{ github.run_id }}"
          echo "Force: ${{ steps.force.outputs.force }}"
          echo "Changed files: ${{ steps.changes.outputs.changed_count }}"
          echo "Sync exit code: ${{ steps.sync.outcome }}"
          echo "::endgroup::"
